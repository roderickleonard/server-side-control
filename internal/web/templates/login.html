{{define "content"}}
<section class="login-shell">
    <div class="login-card">
        <p class="eyebrow">Authenticate</p>
        <h2>Sign in to {{.AppName}}</h2>
        <p class="lead">Use your Ubuntu username and password through PAM on the target host. The bootstrap account remains available as an emergency fallback.</p>
        {{if .RequestError}}
        <div class="alert">{{.RequestError}}</div>
        {{end}}
        <form method="post" class="login-form">
            <label>
                <span>Username</span>
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                <span>Password</span>
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Sign in</button>
        </form>
    </div>
</section>
{{end}}
